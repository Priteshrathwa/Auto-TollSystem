<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Vehicle - Auto Toll System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
            flex-wrap: nowrap;
            overflow-x: auto;
        }
        .card {
            border: none;
            border-radius: 0.75rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(90deg, rgba(52,58,64,1) 0%, rgba(80,87,94,1) 100%);
            color: white;
            text-align: center;
            padding: 1.5rem;
            border-bottom: none;
        }
        .card-header h5 {
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 0;
        }
        .form-label {
            font-weight: 500;
            color: #495057;
        }
        .input-group-text {
            background-color: #e9ecef;
            border-right: none;
            width: 42px;
            justify-content: center;
        }
        .form-control, .form-select {
            border-left: none;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: none;
            border-color: #ced4da;
        }
        .btn-success {
            width: 100%;
            padding: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">Auto Toll System</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'index' %}">Home</a>
                <a class="nav-link" href="{% url 'camera' %}">Camera</a>
                <a class="nav-link" href="{% url 'manual' %}">Manual Entry</a>
                <a class="nav-link active" href="{% url 'register' %}">Register Vehicle</a>
                <a class="nav-link" href="{% url 'transactions' %}">Transactions</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-car-side me-2"></i>Register New Vehicle</h5>
                    </div>
                    <div class="card-body p-4">
                        <form method="post">
                            {% csrf_token %}
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="plate" class="form-label">License Plate Number *</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                        <input type="text" class="form-control" id="plate" name="plate" placeholder="e.g., MH12AB1234" required>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="owner_name" class="form-label">Owner Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                                        <input type="text" class="form-control" id="owner_name" name="owner_name" placeholder="e.g., Rakesh Kumar">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="vehicle_type" class="form-label">Vehicle Type</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-truck-pickup"></i></span>
                                        <select class="form-select" id="vehicle_type" name="vehicle_type">
                                            <option value="car">Car</option>
                                            <option value="motorcycle">Motorcycle</option>
                                            <option value="truck">Truck</option>
                                            <option value="bus">Bus</option>
                                            <option value="other">Other</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="fastag_id" class="form-label">FASTag ID</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-barcode"></i></span>
                                        <input type="text" class="form-control" id="fastag_id" name="fastag_id" placeholder="Fastag id..">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="fastag_balance" class="form-label">FASTag Balance (₹)</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-indian-rupee-sign"></i></span>
                                        <input type="number" class="form-control" id="fastag_balance" name="fastag_balance" min="0" placeholder="e.g., 500">
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="exemption" class="form-label">Exemption Status</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="fas fa-shield-alt"></i></span>
                                        <select class="form-select" id="exemption" name="exemption">
                                            <option value='0'>REGULAR</option>
                                            <option value='1'>EXEMPTED</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success mt-3">Register Vehicle</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-format plate input
        document.getElementById('plate').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        });
    </script>
</body>
</html>
